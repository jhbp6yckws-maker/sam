<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>〇〇掲示板</title>
    <style>
        body {
            font-family: "ＭＳ Ｐゴシック", "MS PGothic", "ヒラギノ角ゴ Pro W3", sans-serif;
            background-color: #EFEFEF;
            color: #000000;
            padding: 20px;
        }
        h1 {
            color: #CC0000;
            font-size: 22px;
            margin-bottom: 20px;
            cursor: pointer;
        }
        h1:hover {
            text-decoration: underline;
        }
        .container {
            max-width: 800px;
        }
        .menu-box {
            background-color: #FFFFFF;
            border: 1px solid #CCCCCC;
            padding: 15px;
            margin-bottom: 20px;
        }
        .thread-list-item {
            margin-bottom: 8px;
        }
        .thread-link {
            color: #0000FF;
            text-decoration: underline;
            cursor: pointer;
            font-size: 16px;
        }
        .thread-box {
            background-color: #FFFFFF;
            border: 1px solid #CCCCCC;
            padding: 15px;
            margin-bottom: 20px;
        }
        .thread-title {
            color: #CC0000;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 2px solid #CC0000;
            padding-bottom: 5px;
        }
        .res {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px dashed #DDDDDD;
        }
        .res-header {
            font-size: 14px;
            margin-bottom: 5px;
        }
        .res-number { color: #000000; }
        .res-name { color: #008000; font-weight: bold; }
        .res-date-id { color: #666666; font-size: 12px; }
        .res-body {
            font-size: 16px;
            margin-left: 2em;
            line-height: 1.4;
        }
        .res-subject { font-weight: bold; color: #CC0000; font-size: 16px; }
        .anchor { color: #0000FF; text-decoration: underline; cursor: pointer; }
        
        .res-body a {
            color: #0000FF;
            text-decoration: underline;
        }
        
        .res-attached-link {
            margin-top: 12px;
            padding: 6px 12px;
            background-color: #F4F7F9;
            border-left: 3px solid #0066CC;
            font-size: 14px;
            display: inline-block;
        }
        .res-attached-link a {
            color: #0066CC;
            font-weight: bold;
            text-decoration: underline;
        }
        
        .btn {
            font-size: 12px;
            padding: 4px 10px;
            cursor: pointer;
            background-color: #F0F0F0;
            border: 1px solid #999999;
            border-radius: 2px;
            margin-right: 5px;
            margin-bottom: 5px;
        }
        .btn:hover { background-color: #E0E0E0; }
        .back-btn { margin-bottom: 15px; display: inline-block; }
        .share-btn { color: #0066CC; font-weight: bold; }
        
        .delete-btn { color: #CC0000; }
        .edit-btn { color: #008000; }
        .cancel-edit-btn { background-color: #FFCCCC; }

        .uploaded-img {
            cursor: zoom-in;
            transition: transform 0.2s;
        }
        .uploaded-img:hover {
            opacity: 0.8;
        }

        .uploaded-img, .uploaded-video {
            max-width: 300px;
            width: 100%;
            height: auto;
            display: block;
            margin-top: 10px;
            border: 1px solid #CCCCCC;
        }
        .uploaded-audio {
            display: block;
            margin-top: 10px;
        }

        /* 埋め込みミニサイト用スタイル */
        .embed-site-container {
            margin-top: 15px;
            max-width: 600px;
            width: 100%;
        }
        .embed-site-title {
            font-size: 12px;
            color: #555555;
            font-weight: bold;
            margin-bottom: 3px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .embed-site-frame {
            width: 100%;
            height: 250px;
            border: 1px solid #999999;
            background-color: #FFFFFF;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        .modal-site-wrapper {
            width: 90%;
            height: 85%;
            background-color: #FFFFFF;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .youtube-container {
            margin-top: 10px;
            max-width: 480px;
            width: 100%;
            aspect-ratio: 16 / 9;
        }
        .youtube-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .form-box {
            margin-top: 20px;
            background-color: #FFFFFF;
            padding: 15px;
            border: 1px solid #CCCCCC;
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
            max-width: 500px;
        }
        .form-title {
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .form-box label { display: inline-block; width: 75px; }
        input[type="text"], textarea {
            width: 80%;
            padding: 4px;
            box-sizing: border-box;
        }
        textarea { height: 100px; }
        
        .code-textarea {
            font-family: monospace;
            height: 80px;
            background-color: #F4F7F9;
            border: 1px solid #A9BCC6;
            margin-bottom: 5px;
        }
        .code-textarea::placeholder {
            color: #888888;
        }
        
        .media-capture-area {
            border: 1px dashed #666;
            padding: 10px;
            margin-top: 10px;
            background: #F9F9F9;
            text-align: center;
        }
        #webcam {
            width: 100%;
            max-width: 240px;
            border: 1px solid #000;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
        }
        .image-modal-mode {
            cursor: zoom-out;
        }
        .modal-content {
            max-width: 90%;
            max-height: 90%;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            border-radius: 4px;
        }
        .modal-close {
            position: absolute;
            top: 20px; right: 25px;
            color: #fff;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1010;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <h1 id="siteTitle">■ 〇〇掲示板 ■</h1>

    <div class="container">
        <div id="lobbyScreen">
            <div class="menu-box">
                <h3>新しいお題でスレッドを立てる</h3>
                <form id="createThreadForm">
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="newThreadTitle">お題(タイトル) :</label>
                        <input type="text" id="newThreadTitle" placeholder="例：JavaScript動的ミニサイトスレ" required>
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="creatorName">名前 :</label>
                        <input type="text" id="creatorName" placeholder="名無しさん">
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="firstMessage">最初の本文 :</label>
                        <textarea id="firstMessage" placeholder="スレッドの最初の書き込みを入力してください" required></textarea>
                    </div>
                    
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="threadLinkUrl">リンクURL :</label>
                        <input type="text" id="threadLinkUrl" placeholder="https://example.com (任意)">
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="threadLinkTitle">リンク名 :</label>
                        <input type="text" id="threadLinkTitle" placeholder="サイトのタイトルなど (任意)">
                    </div>
                    
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="threadHtmlCode" style="width: auto; display: block; margin-bottom: 2px; font-weight: bold;">💻 作成するサイトのHTML (任意) :</label>
                        <textarea id="threadHtmlCode" class="code-textarea" placeholder="例：<img src='画像のURL' alt='写真'>&#13;&#10;<button id='myBtn'>クリック</button>"></textarea>
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="threadCssCode" style="width: auto; display: block; margin-bottom: 2px; font-weight: bold;">🎨 作成するサイトのCSS (任意) :</label>
                        <textarea id="threadCssCode" class="code-textarea" placeholder="例：img { max-width: 100%; } button { color: blue; }"></textarea>
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="threadJsCode" style="width: auto; display: block; margin-bottom: 2px; font-weight: bold;">⚡ 作成するサイトのJavaScript (任意) :</label>
                        <textarea id="threadJsCode" class="code-textarea" placeholder="例：document.getElementById('myBtn').onclick = () => alert('動いた！');"></textarea>
                    </div>
                    
                    <button type="submit" class="btn">新規スレッドを立てる</button>
                </form>
            </div>

            <div class="menu-box">
                <h3>スレッド一覧</h3>
                <div id="threadList"></div>
            </div>
        </div>

        <div id="threadScreen" class="hidden">
            <button class="btn back-btn" id="btnBack">← スレッド一覧に戻る</button>
            <button class="btn back-btn share-btn" id="btnShare">🔗 このスレッドを共有</button>
            <button class="btn back-btn delete-btn hidden" id="btnDeleteThread">🗑️ このスレッドを削除</button>
            
            <div class="thread-box">
                <div class="thread-title" id="activeThreadTitle">スレタイトル</div>
                <div id="resContainer"></div>
            </div>

            <div class="form-box">
                <div class="form-title" id="formActionTitle">このスレッドに書き込む</div>
                <form id="postForm">
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="subject">件名 :</label>
                        <input type="text" id="subject" placeholder="無題">
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="name">名前 :</label>
                        <input type="text" id="name" placeholder="名無しさん">
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <textarea id="message" placeholder="本文を入力してください。" required></textarea>
                    </div>
                    
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="linkUrl">リンクURL :</label>
                        <input type="text" id="linkUrl" placeholder="https://example.com (任意)">
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="linkTitle">リンク名 :</label>
                        <input type="text" id="linkTitle" placeholder="サイトのタイトルなど (任意)">
                    </div>
                    
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="htmlCode" style="width: auto; display: block; margin-bottom: 2px; font-weight: bold;">💻 作成するサイトのHTML (任意) :</label>
                        <textarea id="htmlCode" class="code-textarea" placeholder="例：<img src='画像のURL' style='width:100%;'>"></textarea>
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="cssCode" style="width: auto; display: block; margin-bottom: 2px; font-weight: bold;">🎨 作成するサイトのCSS (任意) :</label>
                        <textarea id="cssCode" class="code-textarea" placeholder="ここにCSSを入力"></textarea>
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="jsCode" style="width: auto; display: block; margin-bottom: 2px; font-weight: bold;">⚡ 作成するサイトのJavaScript (任意) :</label>
                        <textarea id="jsCode" class="code-textarea" placeholder="ここにJavaScriptを入力（scriptタグは不要です）"></textarea>
                    </div>

                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="mediaFile">ファイル添付:</label>
                        <input type="file" id="mediaFile" accept="image/*,video/*,audio/*">
                    </div>
                    
                    <div class="form-row" style="margin-bottom: 10px;">
                        <button type="button" class="btn" id="btnStartCamUser">📷 内カメラ(写真)</button>
                        <button type="button" class="btn" id="btnStartCamEnv">📷 外カメラ(写真)</button>
                        <button type="button" class="btn" id="btnStartVideoUser">📹 内カメラ(動画)</button>
                        <button type="button" class="btn" id="btnStartVideoEnv">📹 外カメラ(動画)</button>
                        <button type="button" class="btn" id="btnStartAudioCapture">🎙️ ボイス録音モード</button>
                    </div>
                    
                    <div id="cameraArea" class="media-capture-area hidden">
                        <video id="webcam" autoplay playsinline muted></video>
                        <br>
                        <button type="button" class="btn" id="btnShutter">📸 写真をパシャリ</button>
                        <button type="button" class="btn" id="btnVideoStart" style="color:red; font-weight:bold;">🔴 録画スタート (最大3秒)</button>
                        <button type="button" class="btn hidden" id="btnVideoStop">■ 停止して保存</button>
                        <button type="button" class="btn" id="btnStopCamera">やめる</button>
                        <canvas id="captureCanvas" class="hidden"></canvas>
                    </div>

                    <div id="audioArea" class="media-capture-area hidden">
                        <p style="font-size:12px; margin:5px 0;">🎙️ マイク録音中...</p>
                        <button type="button" class="btn" id="btnAudioStart" style="color:red; font-weight:bold;">🔴 録音スタート (最大5秒)</button>
                        <button type="button" class="btn hidden" id="btnAudioStop">■ 停止して保存</button>
                        <button type="button" class="btn" id="btnStopAudio">やめる</button>
                    </div>
                    
                    <div id="attachmentPreview" style="margin: 5px 0; color: #008000; font-weight: bold; font-size: 12px;"></div>

                    <button type="submit" class="btn" id="btnSubmitPost">書き込む</button>
                    <button type="button" class="btn cancel-edit-btn hidden" id="btnCancelEdit">編集をキャンセル</button>
                </form>
            </div>
        </div>
    </div>

    <div id="imageModal" class="modal image-modal-mode">
        <span class="modal-close" id="modalClose">&times;</span>
        <img class="modal-content" id="modalTargetImage" alt="拡大画像">
    </div>

    <div id="siteModal" class="modal">
        <span class="modal-close" id="siteModalClose">&times;</span>
        <div class="modal-site-wrapper">
            <iframe id="modalTargetSite" sandbox="allow-scripts allow-same-origin allow-modals allow-forms allow-popups allow-popups-to-escape-sandbox" allow="camera; microphone; display-capture;" style="width: 100%; height: 100%; border: none; background-color: #ffffff;"></iframe>
        </div>
    </div>

    <script>
        // ================= 1. その人だけの一つのID（localStorage） =================
        if (!localStorage.getItem('bbs_user_secret')) {
            const randomSecret = Math.random().toString(36).substring(2, 12).toUpperCase();
            localStorage.setItem('bbs_user_secret', randomSecret);
        }
        const userSecret = localStorage.getItem('bbs_user_secret');

        function generateUserID(dateStr) {
            const dayKey = dateStr.split('(')[0]; 
            const combined = dayKey + userSecret;
            let hash = 0;
            for (let i = 0; i < combined.length; i++) {
                hash = (hash << 5) - hash + combined.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash).toString(36).substring(0, 8).toUpperCase();
        }

        // ================= 2. データ管理 ＆ 初期化 =================
        const sampleThreads = [
            {
                id: 'thread-sample-js',
                title: '【新機能】JavaScript分離入力欄＆画像コード埋め込みテストスレ',
                creatorSecret: 'SYSTEM',
                responses: [
                    {
                        number: 1,
                        name: '管理人★',
                        dateId: '2026/07/13(月) 17:20:00.00 ID:ADMIN',
                        subject: 'JavaScript専用欄とHTML画像サポートを実装しました',
                        rawMessage: '自作ミニサイト構築用に、新しく「JavaScript欄」を独立させました。\nこれにより、HTMLコードの中にわざもざ <script> タグを混ぜて書かなくても、綺麗にスクリプトを記述して動かすことができます！\n下のサンプルボタンを押して動作を確認してみてください。',
                        message: '自作ミニサイト構築用に、新しく「JavaScript欄」を独立させました。<br>これにより、HTMLコードの中にわざわざ &lt;script&gt; タグを混ぜて書かなくても、綺麗にスクリプトを記述して動かすことができます！<br>下のサンプルボタンを押して動作を確認してみてください。',
                        htmlCode: '<div class="main-card">\n  <h3>⚡ JS独立入力テスト</h3>\n  <p>下のボタンを押すとJS欄のコードが発火します。</p>\n  <button id="alertBtn">挨拶する</button>\n  <button id="colorBtn">色を変える</button>\n</div>',
                        cssCode: '.main-card { padding: 15px; background: #FFF; border: 2px solid #CC0000; border-radius: 4px; font-family: sans-serif; }\nbutton { margin-right: 5px; padding: 5px 10px; cursor: pointer; }',
                        jsCode: '// ボタン要素をつかんでイベントをセット\ndocument.getElementById("alertBtn").onclick = () => {\n  alert("こんにちは！JavaScriptが別枠から無事実行されました。");\n};\n\ndocument.getElementById("colorBtn").onclick = () => {\n  const card = document.querySelector(".main-card");\n  card.style.background = card.style.background === "lightpink" ? "#FFF" : "lightpink";\n};',
                        image: "", video: "", audio: "", linkUrl: "", linkTitle: "",
                        creatorSecret: 'SYSTEM', isDeleted: false
                    }
                ]
            }
        ];

        if (!localStorage.getItem('bbs_sample_reset_v11')) {
            localStorage.setItem('bbs_threads', JSON.stringify(sampleThreads));
            localStorage.setItem('bbs_sample_reset_v11', 'true');
        }

        let threads = JSON.parse(localStorage.getItem('bbs_threads')) || sampleThreads;

        let activeThreadId = null;
        let editingResNumber = null; 
        
        let attachedImageB64 = null; 
        let attachedVideoB64 = null;
        let attachedAudioB64 = null;

        let cameraStream = null;
        let audioStream = null;
        let mediaRecorder = null;
        let chunks = [];
        let activeFacingMode = "user"; 
        let autoStopTimeout = null;

        function saveToStorage() {
            try {
                localStorage.setItem('bbs_threads', JSON.stringify(threads));
            } catch (e) {
                alert("【容量エラー】データ量が限界を超えました。不要なスレッドを削除するか、コード量を減らしてください。");
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function convertLinksAndAnchors(rawMessage) {
            let html = escapeHtml(rawMessage);
            html = html.replace(/&gt;&gt;(\d+)/g, '<span class="anchor">&gt;&gt;$1</span>');
            let urlRegex = /(https?:\/\/[^\s<]+)/g;
            html = html.replace(urlRegex, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
            html = html.replace(/\n/g, '<br>');
            return html;
        }

        function getYoutubeId(text) {
            if (!text) return null;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const matches = text.match(/(https?:\/\/[^\s<]+)/g);
            if (!matches) return null;
            for (let url of matches) {
                const match = url.match(regExp);
                if (match && match[2].length === 11) return match[2]; 
            }
            return null;
        }

        function getBbsDate() {
            const now = new Date();
            const days = ['日', '月', '火', '水', '木', '金', '土'];
            return `${now.getFullYear()}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')}(${days[now.getDay()]}) ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}.00`;
        }

        // ================= 3. 画面描画・組み立て =================
        
        function renderThreadList() {
            const listContainer = document.getElementById('threadList');
            listContainer.innerHTML = '';
            if (threads.length === 0) {
                listContainer.innerHTML = '<p style="color:#666;">スレッドがありません。</p>';
                return;
            }
            threads.forEach((thread) => {
                const item = document.createElement('div');
                item.className = 'thread-list-item';
                item.innerHTML = `<span class="thread-link" data-id="${thread.id}">■ ${escapeHtml(thread.title)} (${thread.responses.length})</span>`;
                listContainer.appendChild(item);
            });
        }

        function buildFullSrcdoc(html, css, js) {
            // HTML, CSSに加えて、JSが存在する場合は最後の</body>直前に割り振る構造を出力
            return `
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="UTF-8">
                    <style>
                        body { margin: 10px; font-family: sans-serif; }
                        ${css || ''}
                    </style>
                </head>
                <body>
                    ${html || ''}
                    <script>
                        try {
                            ${js || ''}
                        } catch(err) {
                            console.error("JS Execution Error: ", err);
                        }
                    <\/script>
                </body>
                </html>
            `;
        }

        function renderActiveThread() {
            const thread = threads.find(t => t.id === activeThreadId);
            if (!thread) return;

            document.getElementById('activeThreadTitle').innerText = thread.title;
            
            const btnDeleteThread = document.getElementById('btnDeleteThread');
            btnDeleteThread.classList.toggle('hidden', thread.creatorSecret !== userSecret);

            const resContainer = document.getElementById('resContainer');
            resContainer.innerHTML = '';

            thread.responses.forEach((res) => {
                let mediaTag = '';
                if (res.image) {
                    mediaTag = `<img src="${res.image}" class="uploaded-img" alt="添付画像">`;
                } else if (res.video) {
                    mediaTag = `<video src="${res.video}" class="uploaded-video" controls></video>`;
                } else if (res.audio) {
                    mediaTag = `<audio src="${res.audio}" class="uploaded-audio" controls></audio>`;
                }
                
                let linkTag = '';
                if (res.linkUrl && !res.isDeleted) {
                    const displayTitle = res.linkTitle || res.linkUrl;
                    linkTag = `
                        <div class="res-attached-link">
                            🔗 <b>リンク:</b> <a href="${escapeHtml(res.linkUrl)}" target="_blank" rel="noopener noreferrer">${escapeHtml(displayTitle)}</a>
                        </div>
                    `;
                }
                
                let embedSiteTag = '';
                if ((res.htmlCode || res.cssCode || res.jsCode) && !res.isDeleted) {
                    const fullContent = buildFullSrcdoc(res.htmlCode, res.cssCode, res.jsCode);
                    const safeSrcdoc = escapeHtml(fullContent);
                    embedSiteTag = `
                        <div class="embed-site-container">
                            <div class="embed-site-title">
                                🌐 埋め込みミニサイト:
                                <button class="btn expand-site-btn" data-resnum="${res.number}">🔍 拡大表示</button>
                            </div>
                            <iframe sandbox="allow-scripts allow-same-origin allow-modals allow-forms allow-popups allow-popups-to-escape-sandbox" allow="camera; microphone; display-capture;" srcdoc="${safeSrcdoc}" class="embed-site-frame"></iframe>
                        </div>
                    `;
                }

                let youtubeTag = '';
                if (!res.isDeleted) {
                    const ytId = getYoutubeId(res.rawMessage);
                    if (ytId) {
                        youtubeTag = `<div class="youtube-container"><iframe src="https://www.youtube.com/embed/${ytId}" allowfullscreen></iframe></div>`;
                    }
                }

                let actionButtons = '';
                if (res.creatorSecret === userSecret && !res.isDeleted) {
                    actionButtons = `
                        <button class="btn edit-btn" data-resnum="${res.number}">✏️ 訂正</button>
                        <button class="btn delete-btn" data-resnum="${res.number}">🗑️ 削除</button>
                    `;
                }

                const resHtml = `
                    <div class="res">
                        <div class="res-header">
                            <span class="res-number">${res.number}</span> ：<span class="res-name">${escapeHtml(res.name)}</span> ：<span class="res-date-id">${res.dateId}</span>
                        </div>
                        <div class="res-body">
                            ${res.subject ? `<span class="res-subject">${escapeHtml(res.subject)}</span><br><br>` : ''}
                            ${res.message}
                            ${linkTag}
                            ${mediaTag}
                            ${embedSiteTag}
                            ${youtubeTag}
                        </div>
                        <button class="btn reply-btn" data-resnum="${res.number}">このレスに返信</button>
                        ${actionButtons}
                    </div>
                `;
                resContainer.insertAdjacentHTML('beforeend', resHtml);
            });
        }

        function showScreen(screenId) {
            cancelEditMode(); 
            stopCamera();
            stopAudio();
            if (screenId === 'lobby') {
                document.getElementById('lobbyScreen').classList.remove('hidden');
                document.getElementById('threadScreen').classList.add('hidden');
                renderThreadList();
                history.replaceState(null, null, ' ');
            } else if (screenId === 'thread') {
                document.getElementById('lobbyScreen').classList.add('hidden');
                document.getElementById('threadScreen').classList.remove('hidden');
                renderActiveThread();
            }
        }

        function cancelEditMode() {
            editingResNumber = null;
            clearAttachments();
            document.getElementById('formActionTitle').innerText = "このスレッドに書き込む";
            document.getElementById('btnSubmitPost').innerText = "書き込む";
            document.getElementById('btnCancelEdit').classList.add('hidden');
            document.getElementById('postForm').reset();
        }

        function clearAttachments() {
            attachedImageB64 = null;
            attachedVideoB64 = null;
            attachedAudioB64 = null;
            document.getElementById('attachmentPreview').innerText = "";
        }

        // ================= 4. モーダル処理 =================
        const imageModal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalTargetImage');
        
        const siteModal = document.getElementById('siteModal');
        const modalTargetSite = document.getElementById('modalTargetSite');

        imageModal.addEventListener('click', () => { imageModal.style.display = "none"; });
        document.getElementById('modalClose').addEventListener('click', () => { imageModal.style.display = "none"; });

        function closeSiteModal() {
            siteModal.style.display = "none";
            modalTargetSite.srcdoc = ""; 
        }
        document.getElementById('siteModalClose').addEventListener('click', closeSiteModal);
        siteModal.addEventListener('click', (e) => {
            if (e.target === siteModal) closeSiteModal();
        });

        // ================= 5. カメラ・動画撮影機能 =================
        const cameraArea = document.getElementById('cameraArea');
        const webcam = document.getElementById('webcam');
        const btnShutter = document.getElementById('btnShutter');
        const btnVideoStart = document.getElementById('btnVideoStart');
        const btnVideoStop = document.getElementById('btnVideoStop');
        const captureCanvas = document.getElementById('captureCanvas');
        const attachmentPreview = document.getElementById('attachmentPreview');

        async function startCamera(mode, isVideoMode = false) {
            stopCamera();
            stopAudio();
            clearAttachments();
            activeFacingMode = mode;
            
            const constraints = {
                video: { facingMode: mode },
                audio: isVideoMode
            };

            try {
                cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
                webcam.srcObject = cameraStream;
                webcam.style.transform = (mode === "user") ? "scaleX(-1)" : "scaleX(1)";
                cameraArea.classList.remove('hidden');
                
                btnShutter.classList.toggle('hidden', isVideoMode);
                btnVideoStart.classList.toggle('hidden', !isVideoMode);
                btnVideoStop.classList.add('hidden');

                const camName = (mode === "user") ? "内カメラ" : "外カメラ";
                attachmentPreview.innerText = isVideoMode ? `📹 ${camName}(動画)モード準備完了` : `📷 ${camName}(写真)モード起動中...`;
            } catch (err) {
                alert('カメラの起動に失敗しました。');
                console.error(err);
            }
        }

        document.getElementById('btnStartCamUser').addEventListener('click', () => startCamera("user", false));
        document.getElementById('btnStartCamEnv').addEventListener('click', () => startCamera("environment", false));
        document.getElementById('btnStartVideoUser').addEventListener('click', () => startCamera("user", true));
        document.getElementById('btnStartVideoEnv').addEventListener('click', () => startCamera("environment", true));

        btnShutter.addEventListener('click', () => {
            if (!cameraStream) return;
            const ctx = captureCanvas.getContext('2d');
            captureCanvas.width = webcam.videoWidth;
            captureCanvas.height = webcam.videoHeight;
            if (activeFacingMode === "user") {
                ctx.translate(captureCanvas.width, 0);
                ctx.scale(-1, 1);
            }
            ctx.drawImage(webcam, 0, 0, captureCanvas.width, captureCanvas.height);
            attachedImageB64 = captureCanvas.toDataURL('image/jpeg', 0.6);
            attachmentPreview.innerText = "📸 写真を添付しました！";
            document.getElementById('mediaFile').value = "";
            stopCamera();
        });

        btnVideoStart.addEventListener('click', () => {
            if (!cameraStream) return;
            chunks = [];
            mediaRecorder = new MediaRecorder(cameraStream, { mimeType: 'video/webm;codecs=vp8,opus' });
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
            
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                let reader = new FileReader();
                reader.onload = (e) => {
                    attachedVideoB64 = e.target.result;
                    attachmentPreview.innerText = "📹 動画を添付しました！";
                };
                reader.readAsDataURL(blob);
                stopCamera();
            };

            mediaRecorder.start();
            btnVideoStart.classList.add('hidden');
            btnVideoStop.classList.remove('hidden');
            attachmentPreview.innerText = "🔴 録画中... (最大3秒で自動ストップします)";

            autoStopTimeout = setTimeout(() => {
                if (mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop();
            }, 3000);
        });

        btnVideoStop.addEventListener('click', () => {
            if (autoStopTimeout) clearTimeout(autoStopTimeout);
            if (mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop();
        });

        document.getElementById('btnStopCamera').addEventListener('click', stopCamera);

        function stopCamera() {
            if (autoStopTimeout) clearTimeout(autoStopTimeout);
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }
            cameraArea.classList.add('hidden');
        }

        // ================= 6. ボイス録音機能 =================
        const audioArea = document.getElementById('audioArea');
        const btnAudioStart = document.getElementById('btnAudioStart');
        const btnAudioStop = document.getElementById('btnAudioStop');

        document.getElementById('btnStartAudioCapture').addEventListener('click', async () => {
            stopCamera();
            stopAudio();
            clearAttachments();
            try {
                audioStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                audioArea.classList.remove('hidden');
                btnAudioStart.classList.remove('hidden');
                btnAudioStop.classList.add('hidden');
                attachmentPreview.innerText = "🎙️ ボイス録音モード準備完了";
            } catch (err) {
                alert('マイクの起動に失敗しました。');
                console.error(err);
            }
        });

        btnAudioStart.addEventListener('click', () => {
            if (!audioStream) return;
            chunks = [];
            mediaRecorder = new MediaRecorder(audioStream, { mimeType: 'audio/webm' });
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
            
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                let reader = new FileReader();
                reader.onload = (e) => {
                    attachedAudioB64 = e.target.result;
                    attachmentPreview.innerText = "🎙️ ボイスを添付しました！";
                };
                reader.readAsDataURL(blob);
                stopAudio();
            };

            mediaRecorder.start();
            btnAudioStart.classList.add('hidden');
            btnAudioStop.classList.remove('hidden');
            attachmentPreview.innerText = "🔴 録音中... (最大5秒で自動ストップします)";

            autoStopTimeout = setTimeout(() => {
                if (mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop();
            }, 5000);
        });

        btnAudioStop.addEventListener('click', () => {
            if (autoStopTimeout) clearTimeout(autoStopTimeout);
            if (mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop();
        });

        document.getElementById('btnStopAudio').addEventListener('click', stopAudio);

        function stopAudio() {
            if (autoStopTimeout) clearTimeout(autoStopTimeout);
            if (audioStream) {
                audioStream.getTracks().forEach(track => track.stop());
                audioStream = null;
            }
            audioArea.classList.add('hidden');
        }

        document.getElementById('mediaFile').addEventListener('change', () => { clearAttachments(); });

        // ================= 7. イベントリスナー & 送信処理 =================

        document.getElementById('siteTitle').addEventListener('click', () => showScreen('lobby'));
        document.getElementById('btnBack').addEventListener('click', () => showScreen('lobby'));

        document.getElementById('threadList').addEventListener('click', (e) => {
            if (e.target.classList.contains('thread-link')) {
                activeThreadId = e.target.getAttribute('data-id');
                window.location.hash = activeThreadId;
                showScreen('thread');
            }
        });

        // 新規スレッドを建てる
        document.getElementById('createThreadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const title = document.getElementById('newThreadTitle').value.trim();
            const name = document.getElementById('creatorName').value.trim() || "名無しさん";
            const messageRaw = document.getElementById('firstMessage').value;
            
            const inputLinkUrl = document.getElementById('threadLinkUrl').value.trim();
            const inputLinkTitle = document.getElementById('threadLinkTitle').value.trim();
            const inputHtml = document.getElementById('threadHtmlCode').value; 
            const inputCss = document.getElementById('threadCssCode').value; 
            const inputJs = document.getElementById('threadJsCode').value; 
            
            if(!title || !messageRaw) return;

            const dateStr = getBbsDate();
            const userId = generateUserID(dateStr);
            const newThreadId = 'thread-' + Date.now();
            const messageHtml = convertLinksAndAnchors(messageRaw);

            const newThread = {
                id: newThreadId, title: title, creatorSecret: userSecret,
                responses: [{
                    number: 1, name: name, dateId: `${dateStr} ID:${userId}`, subject: title,
                    rawMessage: messageRaw, message: messageHtml, 
                    htmlCode: inputHtml, cssCode: inputCss, jsCode: inputJs,
                    linkUrl: inputLinkUrl, linkTitle: inputLinkTitle,
                    image: "", video: "", audio: "", creatorSecret: userSecret, isDeleted: false
                }]
            };
            threads.unshift(newThread);
            saveToStorage();
            this.reset();
            activeThreadId = newThreadId;
            window.location.hash = newThreadId;
            showScreen('thread');
        });

        // レス内操作アクション
        document.getElementById('resContainer').addEventListener('click', function(event) {
            if (event.target.classList.contains('uploaded-img')) {
                imageModal.style.display = "flex";
                modalImg.src = event.target.src;
                return;
            }

            if (event.target.classList.contains('expand-site-btn')) {
                const resNum = parseInt(event.target.getAttribute('data-resnum'));
                const thread = threads.find(t => t.id === activeThreadId);
                const res = thread.responses.find(r => r.number === resNum);
                if (res) {
                    const fullContent = buildFullSrcdoc(res.htmlCode, res.cssCode, res.jsCode);
                    modalTargetSite.srcdoc = fullContent;
                    siteModal.style.display = "flex";
                }
                return;
            }

            if (event.target.classList.contains('reply-btn')) {
                const resNum = event.target.getAttribute('data-resnum');
                const textarea = document.getElementById('message');
                textarea.value += `>>${resNum}\n`;
                textarea.focus();
            }
            if (event.target.classList.contains('edit-btn')) {
                const resNum = parseInt(event.target.getAttribute('data-resnum'));
                const thread = threads.find(t => t.id === activeThreadId);
                const res = thread.responses.find(r => r.number === resNum);
                if (!res || res.isDeleted) return;

                editingResNumber = resNum;
                document.getElementById('formActionTitle').innerText = `レス >>${resNum} を訂正する`;
                document.getElementById('subject').value = res.subject || '';
                document.getElementById('name').value = res.name;
                document.getElementById('message').value = res.rawMessage; 
                
                document.getElementById('linkUrl').value = res.linkUrl || '';
                document.getElementById('linkTitle').value = res.linkTitle || '';
                document.getElementById('htmlCode').value = res.htmlCode || ''; 
                document.getElementById('cssCode').value = res.cssCode || ''; 
                document.getElementById('jsCode').value = res.jsCode || ''; 
                
                document.getElementById('btnSubmitPost').innerText = "訂正を保存する";
                document.getElementById('btnCancelEdit').classList.remove('hidden');
                document.getElementById('message').focus();
            }
            if (event.target.classList.contains('delete-btn')) {
                if (confirm('この書き込みを削除しますか？')) {
                    const resNum = parseInt(event.target.getAttribute('data-resnum'));
                    const thread = threads.find(t => t.id === activeThreadId);
                    const res = thread.responses.find(r => r.number === resNum);
                    if (res) {
                        res.name = "あぼーん"; res.subject = "";
                        res.message = '<span style="color:#888; font-style:italic;">（削除されました）</span>';
                        res.image = ""; res.video = ""; res.audio = ""; 
                        res.htmlCode = ""; res.cssCode = ""; res.jsCode = ""; res.linkUrl = ""; res.linkTitle = ""; res.isDeleted = true; 
                        if (editingResNumber === resNum) cancelEditMode(); 
                        saveToStorage(); renderActiveThread();
                    }
                }
            }
        });

        document.getElementById('btnCancelEdit').addEventListener('click', cancelEditMode);

        // 送信確定処理
        document.getElementById('postForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const thread = threads.find(t => t.id === activeThreadId);
            if (!thread) return;

            let inputSubject = document.getElementById('subject').value.trim();
            let inputName = document.getElementById('name').value.trim() || "名無しさん";
            let inputMessage = document.getElementById('message').value;
            
            let inputLinkUrl = document.getElementById('linkUrl').value.trim();
            let inputLinkTitle = document.getElementById('linkTitle').value.trim();
            let inputHtml = document.getElementById('htmlCode').value; 
            let inputCss = document.getElementById('cssCode').value; 
            let inputJs = document.getElementById('jsCode').value; 
            
            let messageHtml = convertLinksAndAnchors(inputMessage);
            let mediaFile = document.getElementById('mediaFile').files[0];

            const finalizePost = (base64Data, mediaType) => {
                if (editingResNumber !== null) {
                    const res = thread.responses.find(r => r.number === editingResNumber);
                    if (res) {
                        res.name = inputName; res.subject = inputSubject;
                        res.rawMessage = inputMessage; res.message = messageHtml;
                        res.linkUrl = inputLinkUrl; res.linkTitle = inputLinkTitle;
                        res.htmlCode = inputHtml; res.cssCode = inputCss; res.jsCode = inputJs;
                        if (mediaType) {
                            res.image = mediaType === 'image' ? base64Data : "";
                            res.video = mediaType === 'video' ? base64Data : "";
                            res.audio = mediaType === 'audio' ? base64Data : "";
                        }
                        saveToStorage(); renderActiveThread(); cancelEditMode();
                    }
                } else {
                    const nextResNumber = thread.responses.length + 1;
                    const dateStr = getBbsDate();
                    const userId = generateUserID(dateStr);

                    const newResponse = {
                        number: nextResNumber, name: inputName, dateId: `${dateStr} ID:${userId}`,
                        subject: inputSubject, rawMessage: inputMessage, message: messageHtml,
                        htmlCode: inputHtml, cssCode: inputCss, jsCode: inputJs,
                        linkUrl: inputLinkUrl, linkTitle: inputLinkTitle,
                        image: mediaType === 'image' ? base64Data : "",
                        video: mediaType === 'video' ? base64Data : "",
                        audio: mediaType === 'audio' ? base64Data : "",
                        creatorSecret: userSecret, isDeleted: false
                    };
                    thread.responses.push(newResponse);
                    saveToStorage(); renderActiveThread(); cancelEditMode();
                }
            };

            if (attachedImageB64) {
                finalizePost(attachedImageB64, 'image');
            } else if (attachedVideoB64) {
                finalizePost(attachedVideoB64, 'video');
            } else if (attachedAudioB64) {
                finalizePost(attachedAudioB64, 'audio');
            } else if (mediaFile) {
                let reader = new FileReader();
                let type = 'image';
                if (mediaFile.type.startsWith('video/')) type = 'video';
                if (mediaFile.type.startsWith('audio/')) type = 'audio';
                
                reader.onload = (e) => finalizePost(e.target.result, type);
                reader.readAsDataURL(mediaFile);
            } else {
                finalizePost(null, null);
            }
        });

        document.getElementById('btnDeleteThread').addEventListener('click', () => {
            if (confirm('本当にこのスレッド全体を削除しますか？')) {
                threads = threads.filter(t => t.id !== activeThreadId);
                saveToStorage(); showScreen('lobby');
            }
        });

        document.getElementById('btnShare').addEventListener('click', () => {
            const thread = threads.find(t => t.id === activeThreadId);
            if (!thread) return;
            const shareUrl = window.location.href.split('#')[0] + '#' + activeThreadId;
            prompt('コピーして共有してください：', `【〇〇掲示板】お題：「${thread.title}」\nURL: ${shareUrl}`);
        });

        window.addEventListener('DOMContentLoaded', () => {
            const hash = window.location.hash.substring(1);
            if (hash && threads.some(t => t.id === hash)) {
                activeThreadId = hash;
                showScreen('thread');
            } else {
                showScreen('lobby');
            }
        });
    </script>
</body>
</html>
