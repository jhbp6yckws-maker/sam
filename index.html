<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超多機能 共有リアルタイム掲示板</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: "ＭＳ Ｐゴシック", "MS PGothic", "ヒラギノ角ゴ Pro W3", sans-serif;
            background-color: #EFEFEF;
            color: #000000;
            padding: 20px;
        }
        h1 {
            color: #CC0000;
            font-size: 22px;
            margin-bottom: 20px;
            cursor: pointer;
        }
        h1:hover { text-decoration: underline; }
        .container { max-width: 800px; }
        .menu-box {
            background-color: #FFFFFF;
            border: 1px solid #CCCCCC;
            padding: 15px;
            margin-bottom: 20px;
        }
        .thread-list-item { margin-bottom: 8px; }
        .thread-link {
            color: #0000FF;
            text-decoration: underline;
            cursor: pointer;
            font-size: 16px;
        }
        .thread-box {
            background-color: #FFFFFF;
            border: 1px solid #CCCCCC;
            padding: 15px;
            margin-bottom: 20px;
        }
        .thread-title {
            color: #CC0000;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 2px solid #CC0000;
            padding-bottom: 5px;
        }
        .res {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px dashed #DDDDDD;
        }
        .res-header { font-size: 14px; margin-bottom: 5px; }
        .res-number { color: #000000; }
        .res-name { color: #008000; font-weight: bold; }
        .res-date-id { color: #666666; font-size: 12px; }
        .res-body { font-size: 16px; margin-left: 2em; line-height: 1.4; }
        .res-subject { font-weight: bold; color: #CC0000; font-size: 16px; }
        .edited-tag { color: #FF6600; font-size: 11px; font-weight: bold; margin-left: 5px; }
        .anchor { color: #0000FF; text-decoration: underline; cursor: pointer; }
        
        .res-body a { color: #0000FF; text-decoration: underline; }
        
        .res-attached-link {
            margin-top: 12px;
            padding: 6px 12px;
            background-color: #F4F7F9;
            border-left: 3px solid #0066CC;
            font-size: 14px;
            display: inline-block;
        }
        .res-attached-link a { color: #0066CC; font-weight: bold; text-decoration: underline; }
        
        .btn {
            font-size: 12px;
            padding: 4px 10px;
            cursor: pointer;
            background-color: #F0F0F0;
            border: 1px solid #999999;
            border-radius: 2px;
            margin-right: 5px;
            margin-bottom: 5px;
        }
        .btn:hover { background-color: #E0E0E0; }
        .back-btn { margin-bottom: 15px; display: inline-block; }
        .share-btn { color: #0066CC; font-weight: bold; }
        .delete-btn { color: #CC0000; }
        .edit-btn { color: #0066CC; }

        .uploaded-img { cursor: zoom-in; transition: transform 0.2s; }
        .uploaded-img:hover { opacity: 0.8; }
        .uploaded-img, .uploaded-video {
            max-width: 300px;
            width: 100%;
            height: auto;
            display: block;
            margin-top: 10px;
            border: 1px solid #CCCCCC;
        }
        .uploaded-audio { display: block; margin-top: 10px; }

        .embed-site-container { margin-top: 15px; max-width: 600px; width: 100%; }
        .embed-site-title {
            font-size: 12px; color: #555555; font-weight: bold;
            margin-bottom: 3px; display: flex; align-items: center; gap: 5px;
        }
        .embed-site-frame {
            width: 100%; height: 250px; border: 1px solid #999999;
            background-color: #FFFFFF; box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        .modal-site-wrapper {
            width: 90%; height: 85%; background-color: #FFFFFF;
            border-radius: 4px; overflow: hidden; box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .form-box {
            margin-top: 20px; background-color: #FFFFFF; padding: 15px;
            border: 1px solid #CCCCCC; display: inline-block; width: 100%;
            box-sizing: border-box; max-width: 500px;
        }
        .form-title { font-weight: bold; margin-bottom: 10px; font-size: 14px; }
        .form-box label { display: inline-block; width: 75px; }
        input[type="text"], textarea { width: 80%; padding: 4px; box-sizing: border-box; }
        textarea { height: 100px; }
        
        .code-textarea {
            font-family: monospace; height: 80px;
            background-color: #F4F7F9; border: 1px solid #A9BCC6; margin-bottom: 5px;
        }
        
        .media-capture-area {
            border: 1px dashed #666; padding: 10px; margin-top: 10px;
            background: #F9F9F9; text-align: center;
        }
        #webcam { width: 100%; max-width: 280px; border: 1px solid #000; background: #000; }
        .recording-timer { color: red; font-weight: bold; font-size: 14px; margin-top: 5px; }
        
        .modal {
            display: none; position: fixed; z-index: 1000; top: 0; left: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.85);
            justify-content: center; align-items: center;
        }
        .image-modal-mode { cursor: zoom-out; }
        .modal-content { max-width: 90%; max-height: 90%; box-shadow: 0 0 20px rgba(255,255,255,0.2); border-radius: 4px; }
        .modal-close {
            position: absolute; top: 20px; right: 25px; color: #fff;
            font-size: 35px; font-weight: bold; cursor: pointer; z-index: 1010;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <h1 id="siteTitle">■ 超多機能 共有リアルタイム掲示板 ■</h1>

    <div class="container">
        <div id="lobbyScreen">
            <div class="menu-box">
                <h3>新しいお題でスレッドを立てる</h3>
                <form id="createThreadForm">
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="newThreadTitle">お題(タイトル) :</label>
                        <input type="text" id="newThreadTitle" placeholder="例：WEB開発お披露目スレ" required>
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="creatorName">名前 :</label>
                        <input type="text" id="creatorName" placeholder="名無しさん">
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="firstMessage">最初の本文 :</label>
                        <textarea id="firstMessage" placeholder="スレッドの解説など" required></textarea>
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="threadLinkUrl">リンクURL :</label>
                        <input type="text" id="threadLinkUrl" placeholder="https://example.com (任意)">
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="threadLinkTitle">リンク名 :</label>
                        <input type="text" id="threadLinkTitle" placeholder="サイト名など (任意)">
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="threadHtmlCode" style="width: auto; display: block; margin-bottom: 2px; font-weight: bold;">💻 HTML (任意) :</label>
                        <textarea id="threadHtmlCode" class="code-textarea" placeholder="<button id='btn'>Click</button>"></textarea>
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="threadCssCode" style="width: auto; display: block; margin-bottom: 2px; font-weight: bold;">🎨 CSS (任意) :</label>
                        <textarea id="threadCssCode" class="code-textarea" placeholder="button { color: red; }"></textarea>
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="threadJsCode" style="width: auto; display: block; margin-bottom: 2px; font-weight: bold;">⚡ JavaScript (任意) :</label>
                        <textarea id="threadJsCode" class="code-textarea" placeholder="document.getElementById('btn').onclick = () => alert('OK');"></textarea>
                    </div>
                    <button type="submit" class="btn">新規スレッドを立てる</button>
                </form>
            </div>

            <div class="menu-box">
                <h3>スレッド一覧（リアルタイム同期）</h3>
                <div id="threadList">読み込み中...</div>
            </div>
        </div>

        <div id="threadScreen" class="hidden">
            <button class="btn back-btn" id="btnBack">← スレッド一覧に戻る</button>
            <button class="btn back-btn share-btn" id="btnShare">🔗 このスレッドの共有リンクを取得</button>
            <button class="btn back-btn delete-btn hidden" id="btnDeleteThread">🗑️ このスレッドを削除</button>
            
            <div class="thread-box">
                <div class="thread-title" id="activeThreadTitle">スレタイトル</div>
                <div id="resContainer"></div>
            </div>

            <div class="form-box">
                <div class="form-title" id="writeFormTitle">このスレッドに書き込む</div>
                <form id="postForm">
                    <input type="hidden" id="editPostId" value="">

                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="subject">件名 :</label>
                        <input type="text" id="subject" placeholder="無題">
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="name">名前 :</label>
                        <input type="text" id="name" placeholder="名無しさん">
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <textarea id="message" placeholder="本文を入力してください" required></textarea>
                    </div>
                    
                    <div id="mediaFieldsGroup">
                        <div class="form-row" style="margin-bottom: 10px;">
                            <label for="linkUrl">リンクURL :</label>
                            <input type="text" id="linkUrl" placeholder="https://...">
                        </div>
                        <div class="form-row" style="margin-bottom: 10px;">
                            <label for="linkTitle">リンク名 :</label>
                            <input type="text" id="linkTitle" placeholder="タイトル">
                        </div>
                        <div class="form-row" style="margin-bottom: 10px;">
                            <label for="htmlCode" style="width: auto; display: block; margin-bottom: 2px; font-weight: bold;">💻 HTML :</label>
                            <textarea id="htmlCode" class="code-textarea"></textarea>
                        </div>
                        <div class="form-row" style="margin-bottom: 10px;">
                            <label for="cssCode" style="width: auto; display: block; margin-bottom: 2px; font-weight: bold;">🎨 CSS :</label>
                            <textarea id="cssCode" class="code-textarea"></textarea>
                        </div>
                        <div class="form-row" style="margin-bottom: 10px;">
                            <label for="jsCode" style="width: auto; display: block; margin-bottom: 2px; font-weight: bold;">⚡ JavaScript :</label>
                            <textarea id="jsCode" class="code-textarea"></textarea>
                        </div>
                        <div class="form-row" style="margin-bottom: 10px;">
                            <label for="mediaFile">ファイル添付:</label>
                            <input type="file" id="mediaFile" accept="image/*,video/*,audio/*">
                        </div>
                        <div class="form-row" style="margin-bottom: 10px;">
                            <button type="button" class="btn" id="btnStartCamPhoto">📷 写真撮影</button>
                            <button type="button" class="btn" id="btnStartCamVideo">🎥 動画撮影(最大30秒)</button>
                            <button type="button" class="btn" id="btnStartAudioCapture">🎙️ 録音(最大60秒)</button>
                        </div>
                    </div>

                    <div id="cameraArea" class="media-capture-area hidden">
                        <video id="webcam" autoplay playsinline muted></video><br>
                        <div id="recTimer" class="recording-timer hidden">🔴 REC: 0秒 / 30秒</div>
                        <button type="button" class="btn" id="btnShutter">📸 撮影する</button>
                        <button type="button" class="btn hidden" id="btnStartVideoRec" style="color: red;">🔴 撮影開始</button>
                        <button type="button" class="btn hidden" id="btnStopVideoRec">■ 停止</button>
                        <button type="button" class="btn" id="btnStopCamera">中止</button>
                        <canvas id="captureCanvas" class="hidden"></canvas>
                    </div>

                    <div id="audioArea" class="media-capture-area hidden">
                        <div id="audioTimer" class="recording-timer">🔴 REC: 0秒 / 60秒</div>
                        <button type="button" class="btn" id="btnAudioStart" style="color:red;">🔴 録音開始</button>
                        <button type="button" class="btn hidden" id="btnAudioStop">■ 停止</button>
                        <button type="button" class="btn" id="btnStopAudio">中止</button>
                    </div>

                    <div id="attachmentPreview" style="margin: 5px 0; color: #008000; font-weight: bold; font-size: 12px;"></div>
                    
                    <button type="submit" class="btn" id="btnSubmitPost">書き込む</button>
                    <button type="button" class="btn hidden" id="btnCancelEdit" style="background-color: #CCCCCC;">訂正をキャンセル</button>
                </form>
            </div>
        </div>
    </div>

    <div id="imageModal" class="modal image-modal-mode"><span class="modal-close" id="modalClose">&times;</span><img class="modal-content" id="modalTargetImage"></div>
    <div id="siteModal" class="modal"><span class="modal-close" id="siteModalClose">&times;</span><div class="modal-site-wrapper"><iframe id="modalTargetSite" sandbox="allow-scripts allow-same-origin allow-modals allow-forms allow-popups allow-popups-to-escape-sandbox" allow="camera; microphone; display-capture;" style="width: 100%; height: 100%; border: none; background-color: #ffffff;"></iframe></div></div>

    <script>
        // Supabase接続設定
        const SUPABASE_URL = "https://iustcqynphestdbqjpiu.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_8GQRZs0KpN3ByPfINhVDFg_j9jMUhPs";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 投稿者の識別キー
        if (!localStorage.getItem('bbs_user_secret')) {
            localStorage.setItem('bbs_user_secret', Math.random().toString(36).substring(2, 12).toUpperCase());
        }
        const userSecret = localStorage.getItem('bbs_user_secret');

        function generateUserID(dateStr) {
            const dayKey = dateStr.split('(')[0]; 
            const combined = dayKey + userSecret;
            let hash = 0;
            for (let i = 0; i < combined.length; i++) { hash = (hash << 5) - hash + combined.charCodeAt(i); hash |= 0; }
            return Math.abs(hash).toString(36).substring(0, 8).toUpperCase();
        }

        let activeThreadId = null;
        let attachedImageB64 = null, attachedVideoB64 = null, attachedAudioB64 = null;
        let cameraStream = null, audioStream = null, mediaRecorder = null, chunks = [];
        let recordSeconds = 0, recordInterval = null;

        function escapeHtml(str) { return str ? str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;') : ''; }
        function convertLinksAndAnchors(raw) { let html = escapeHtml(raw).replace(/&gt;&gt;(\d+)/g, '<span class="anchor">&gt;&gt;$1</span>'); return html.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>').replace(/\n/g, '<br>'); }
        function buildFullSrcdoc(h, c, j) { return `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:10px;font-family:sans-serif;}${c||''}</style></head><body>${h||''}<script>try{${j||''}}catch(e){console.error(e)}<\/script></body></html>`; }
        function clearAttachments() { attachedImageB64 = null; attachedVideoB64 = null; attachedAudioB64 = null; document.getElementById('attachmentPreview').innerText = ""; }

        // ファイル入力
        document.getElementById('mediaFile').addEventListener('change', function(e) {
            clearAttachments();
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                if (file.type.startsWith('image/')) {
                    attachedImageB64 = evt.target.result;
                    document.getElementById('attachmentPreview').innerText = "🖼️ 画像ファイルを選択しました";
                } else if (file.type.startsWith('video/')) {
                    attachedVideoB64 = evt.target.result;
                    document.getElementById('attachmentPreview').innerText = "🎥 動画ファイルを選択しました";
                } else if (file.type.startsWith('audio/')) {
                    attachedAudioB64 = evt.target.result;
                    document.getElementById('attachmentPreview').innerText = "🎵 音声ファイルを選択しました";
                }
            };
            reader.readAsDataURL(file);
        });

        // --- カメラ起動（写真 or 動画兼用） ---
        async function startCamera(forVideo = false) {
            stopCamera(); stopAudio(); clearAttachments();
            try {
                // 動画の場合はマイク(audio)も一緒に起動
                const constraints = { video: { facingMode: "user" }, audio: forVideo };
                cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
                const videoEl = document.getElementById('webcam');
                videoEl.srcObject = cameraStream;
                videoEl.muted = !forVideo; // 録画中はハウリング防止のため自身の音はミュート

                document.getElementById('cameraArea').classList.remove('hidden');

                if (forVideo) {
                    document.getElementById('btnShutter').classList.add('hidden');
                    document.getElementById('btnStartVideoRec').classList.remove('hidden');
                    document.getElementById('btnStopVideoRec').classList.add('hidden');
                    document.getElementById('recTimer').classList.remove('hidden');
                    document.getElementById('recTimer').innerText = "🔴 REC: 0秒 / 30秒";
                } else {
                    document.getElementById('btnShutter').classList.remove('hidden');
                    document.getElementById('btnStartVideoRec').classList.add('hidden');
                    document.getElementById('btnStopVideoRec').classList.add('hidden');
                    document.getElementById('recTimer').classList.add('hidden');
                }
            } catch (e) { alert("カメラ・マイクの起動に失敗しました。カメラの使用を許可してください。"); }
        }

        document.getElementById('btnStartCamPhoto').addEventListener('click', () => startCamera(false));
        document.getElementById('btnStartCamVideo').addEventListener('click', () => startCamera(true));

        // 写真シャッター
        document.getElementById('btnShutter').addEventListener('click', () => {
            const canvas = document.getElementById('captureCanvas'), video = document.getElementById('webcam');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            attachedImageB64 = canvas.toDataURL('image/jpeg', 0.6);
            document.getElementById('attachmentPreview').innerText = "📸 写真を撮影して添付しました";
            stopCamera();
        });

        // --- 🎥 動画撮影（最大30秒）の制御 ---
        document.getElementById('btnStartVideoRec').addEventListener('click', () => {
            chunks = [];
            // カメラと音声を含めたストリームから録画
            mediaRecorder = new MediaRecorder(cameraStream, { mimeType: 'video/webm;codecs=vp9,opus' });
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                let r = new FileReader();
                r.onload = e => {
                    attachedVideoB64 = e.target.result;
                    document.getElementById('attachmentPreview').innerText = "🎥 録画動画（最大30秒）を添付しました";
                };
                r.readAsDataURL(blob);
                stopCamera();
            };

            mediaRecorder.start();
            document.getElementById('btnStartVideoRec').classList.add('hidden');
            document.getElementById('btnStopVideoRec').classList.remove('hidden');

            // 30秒タイマースタート
            recordSeconds = 0;
            recordInterval = setInterval(() => {
                recordSeconds++;
                document.getElementById('recTimer').innerText = `🔴 REC: ${recordSeconds}秒 / 30秒`;
                if (recordSeconds >= 30) {
                    stopVideoRecording();
                }
            }, 1000);
        });

        document.getElementById('btnStopVideoRec').addEventListener('click', stopVideoRecording);

        function stopVideoRecording() {
            clearInterval(recordInterval);
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
            }
        }

        function stopCamera() {
            clearInterval(recordInterval);
            if(cameraStream){ cameraStream.getTracks().forEach(t=>t.stop()); cameraStream=null; }
            document.getElementById('cameraArea').classList.add('hidden');
        }

        // --- 🎙️ 録音（最大60秒）の制御 ---
        document.getElementById('btnStartAudioCapture').addEventListener('click', async () => {
            stopCamera(); stopAudio(); clearAttachments();
            try {
                audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                document.getElementById('audioArea').classList.remove('hidden');
                document.getElementById('btnAudioStart').classList.remove('hidden');
                document.getElementById('btnAudioStop').classList.add('hidden');
                document.getElementById('audioTimer').innerText = "🔴 REC: 0秒 / 60秒";
            } catch(e) { alert("マイクの起動に失敗しました。"); }
        });

        document.getElementById('btnAudioStart').addEventListener('click', () => {
            chunks = []; mediaRecorder = new MediaRecorder(audioStream);
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                let r = new FileReader();
                r.onload = e => {
                    attachedAudioB64 = e.target.result;
                    document.getElementById('attachmentPreview').innerText = "🎙️ ボイスメモ（最大60秒）を添付しました";
                };
                r.readAsDataURL(blob);
                stopAudio();
            };
            mediaRecorder.start();
            document.getElementById('btnAudioStart').classList.add('hidden');
            document.getElementById('btnAudioStop').classList.remove('hidden');

            // 60秒タイマースタート
            recordSeconds = 0;
            recordInterval = setInterval(() => {
                recordSeconds++;
                document.getElementById('audioTimer').innerText = `🔴 REC: ${recordSeconds}秒 / 60秒`;
                if (recordSeconds >= 60) {
                    stopAudioRecording();
                }
            }, 1000);
        });

        document.getElementById('btnAudioStop').addEventListener('click', stopAudioRecording);

        function stopAudioRecording() {
            clearInterval(recordInterval);
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
            }
        }

        function stopAudio() {
            clearInterval(recordInterval);
            if(audioStream){ audioStream.getTracks().forEach(t=>t.stop()); audioStream=null; }
            document.getElementById('audioArea').classList.add('hidden');
        }

        document.getElementById('btnStopCamera').addEventListener('click', stopCamera);
        document.getElementById('btnStopAudio').addEventListener('click', stopAudio);

        // モーダル
        const imgModal = document.getElementById('imageModal'), siteModal = document.getElementById('siteModal'), modalTargetSite = document.getElementById('modalTargetSite');
        imgModal.addEventListener('click', () => imgModal.style.display = "none");
        document.getElementById('siteModalClose').addEventListener('click', () => { siteModal.style.display = "none"; modalTargetSite.srcdoc = ""; });

        // --- Supabase 読み書き処理 ---

        // スレッド一覧表示
        async function fetchThreads() {
            const { data, error } = await _supabase
                .from('posts')
                .select('*')
                .order('id', { ascending: true });

            if (error) {
                console.error(error);
                document.getElementById('threadList').innerText = "データの取得に失敗しました。";
                return;
            }

            const threadMap = {};
            data.forEach(post => {
                const tId = post.thread_id;
                if (!threadMap[tId]) {
                    threadMap[tId] = { id: tId, title: post.subject || "無題のスレッド", posts: [] };
                }
                threadMap[tId].posts.push(post);
            });

            const container = document.getElementById('threadList');
            container.innerHTML = '';

            const threadList = Object.values(threadMap);
            if (threadList.length === 0) {
                container.innerHTML = '<div>まだスレッドがありません。上のフォームから作成してください！</div>';
                return;
            }

            threadList.forEach(t => {
                const firstPost = t.posts[0];
                const title = firstPost ? (firstPost.subject || firstPost.message.substring(0, 20)) : t.title;
                container.insertAdjacentHTML('beforeend', `
                    <div class="thread-list-item">
                        <span class="thread-link" data-id="${t.id}">■ ${escapeHtml(title)} (${t.posts.length})</span>
                    </div>
                `);
            });
        }

        // 個別スレッドの描画
        async function renderActiveThread() {
            const { data, error } = await _supabase
                .from('posts')
                .select('*')
                .eq('thread_id', activeThreadId)
                .order('id', { ascending: true });

            if (error || data.length === 0) return;

            const firstPost = data[0];
            document.getElementById('activeThreadTitle').innerText = firstPost.subject || "無題のスレッド";
            document.getElementById('btnDeleteThread').classList.toggle('hidden', firstPost.creator_secret !== userSecret);

            const container = document.getElementById('resContainer');
            container.innerHTML = '';

            data.forEach((res, index) => {
                const resNum = index + 1;
                const isOp = (res.creator_secret === userSecret);

                // メディアタグの作成
                let media = "";
                if (res.image) {
                    media = `<img src="${res.image}" class="uploaded-img">`;
                } else if (res.video) {
                    media = `<video src="${res.video}" class="uploaded-video" controls></video>`;
                } else if (res.audio) {
                    media = `<audio src="${res.audio}" class="uploaded-audio" controls></audio>`;
                }

                // リンク
                let link = res.link_url ? `<div class="res-attached-link">🔗 <b>リンク:</b> <a href="${escapeHtml(res.link_url)}" target="_blank">${escapeHtml(res.link_title || res.link_url)}</a></div>` : '';

                // ミニサイト埋め込み
                let embed = (res.html_code || res.css_code || res.js_code) ? `<div class="embed-site-container"><div class="embed-site-title">🌐 埋め込みミニサイト: <button class="btn expand-site-btn" data-id="${res.id}">🔍 拡大</button></div><iframe sandbox="allow-scripts allow-same-origin allow-modals allow-forms allow-popups allow-popups-to-escape-sandbox" srcdoc="${escapeHtml(buildFullSrcdoc(res.html_code, res.css_code, res.js_code))}" class="embed-site-frame"></iframe></div>` : '';

                // 訂正タグ
                let editedLabel = res.is_edited ? `<span class="edited-tag">(訂正済)</span>` : '';

                // アクションボタン（削除・訂正）
                let actions = "";
                if (isOp && !res.is_deleted) {
                    actions = `
                        <button class="btn edit-btn" data-id="${res.id}">✍️ 訂正</button>
                        <button class="btn delete-btn" data-id="${res.id}">🗑️ 削除</button>
                    `;
                }

                const dateObj = new Date(res.created_at);
                const days = ['日', '月', '火', '水', '木', '金', '土'];
                const dateStr = `${dateObj.getFullYear()}/${String(dateObj.getMonth() + 1).padStart(2, '0')}/${String(dateObj.getDate()).padStart(2, '0')}(${days[dateObj.getDay()]}) ${String(dateObj.getHours()).padStart(2, '0')}:${String(dateObj.getMinutes()).padStart(2, '0')}:${String(dateObj.getSeconds()).padStart(2, '0')}`;
                const displayID = generateUserID(dateStr);

                container.insertAdjacentHTML('beforeend', `
                    <div class="res">
                        <div class="res-header">
                            <span class="res-number">${resNum}</span> ：
                            <span class="res-name">${escapeHtml(res.name)}</span> ：
                            <span class="res-date-id">${dateStr} ID:${displayID}</span>
                            ${editedLabel}
                        </div>
                        <div class="res-body">
                            ${resNum > 1 && res.subject ? `<span class="res-subject">${escapeHtml(res.subject)}</span><br><br>` : ''}
                            <span id="text-body-${res.id}">${res.is_deleted ? '（削除されました）' : convertLinksAndAnchors(res.message)}</span>
                            ${res.is_deleted ? '' : link}
                            ${res.is_deleted ? '' : media}
                            ${res.is_deleted ? '' : embed}
                        </div>
                        <button class="btn reply-btn" data-resnum="${resNum}">返信</button>${actions}
                    </div>
                `);
            });
        }

        function showScreen(id) {
            stopCamera(); stopAudio(); clearAttachments();
            cancelEditMode();
            if (id === 'lobby') {
                document.getElementById('lobbyScreen').classList.remove('hidden');
                document.getElementById('threadScreen').classList.add('hidden');
                fetchThreads();
            } else {
                document.getElementById('lobbyScreen').classList.add('hidden');
                document.getElementById('threadScreen').classList.remove('hidden');
                renderActiveThread();
            }
        }

        // --- フォーム送信制御（投稿 ＆ 訂正） ---
        document.getElementById('postForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const editId = document.getElementById('editPostId').value;
            const message = document.getElementById('message').value;

            if (editId) {
                // 【訂正処理】
                const { error } = await _supabase
                    .from('posts')
                    .update({
                        message: message,
                        is_edited: true
                    })
                    .eq('id', editId);

                if (error) {
                    alert("訂正に失敗しました。");
                    console.error(error);
                } else {
                    alert("投稿を訂正しました。");
                    cancelEditMode();
                    renderActiveThread();
                }
            } else {
                // 【新規書き込み処理】
                const name = document.getElementById('name').value.trim() || "名無しさん";
                const subject = document.getElementById('subject').value.trim();

                const { error } = await _supabase
                    .from('posts')
                    .insert([{
                        name: name,
                        subject: subject,
                        message: message,
                        thread_id: activeThreadId,
                        creator_secret: userSecret,
                        link_url: document.getElementById('linkUrl').value.trim(),
                        link_title: document.getElementById('linkTitle').value.trim(),
                        html_code: document.getElementById('htmlCode').value,
                        css_code: document.getElementById('cssCode').value,
                        js_code: document.getElementById('jsCode').value,
                        image: attachedImageB64 || "",
                        video: attachedVideoB64 || "",
                        audio: attachedAudioB64 || "",
                        is_deleted: false,
                        is_edited: false
                    }]);

                if (error) {
                    alert("書き込みに失敗しました。");
                    console.error(error);
                    return;
                }

                this.reset();
                clearAttachments();
                document.getElementById('mediaFile').value = "";
                renderActiveThread();
            }
        });

        // 訂正モードへの切り替え
        async function enterEditMode(id) {
            const { data, error } = await _supabase.from('posts').select('*').eq('id', id).single();
            if (error || !data) return;

            document.getElementById('editPostId').value = id;
            document.getElementById('message').value = data.message;
            document.getElementById('message').focus();

            // 訂正中は他の入力フィールドを隠す
            document.getElementById('writeFormTitle').innerText = "✍️ 投稿を訂正中...";
            document.getElementById('subject').parentElement.classList.add('hidden');
            document.getElementById('name').parentElement.classList.add('hidden');
            document.getElementById('mediaFieldsGroup').classList.add('hidden');
            document.getElementById('btnSubmitPost').innerText = "訂正内容を保存する";
            document.getElementById('btnCancelEdit').classList.remove('hidden');
        }

        // 訂正モードの解除
        function cancelEditMode() {
            document.getElementById('editPostId').value = "";
            document.getElementById('message').value = "";
            document.getElementById('writeFormTitle').innerText = "このスレッドに書き込む";
            document.getElementById('subject').parentElement.classList.remove('hidden');
            document.getElementById('name').parentElement.classList.remove('hidden');
            document.getElementById('mediaFieldsGroup').classList.remove('hidden');
            document.getElementById('btnSubmitPost').innerText = "書き込む";
            document.getElementById('btnCancelEdit').classList.add('hidden');
        }

        document.getElementById('btnCancelEdit').addEventListener('click', cancelEditMode);

        // スレッド一覧の遷移
        document.getElementById('siteTitle').addEventListener('click', () => { activeThreadId = null; window.location.hash = ""; showScreen('lobby'); });
        document.getElementById('btnBack').addEventListener('click', () => { activeThreadId = null; window.location.hash = ""; showScreen('lobby'); });
        
        document.getElementById('threadList').addEventListener('click', e => {
            if (e.target.classList.contains('thread-link')) {
                activeThreadId = e.target.getAttribute('data-id');
                window.location.hash = activeThreadId;
                showScreen('thread');
            }
        });

        // スレッド新規作成
        document.getElementById('createThreadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const title = document.getElementById('newThreadTitle').value.trim();
            const name = document.getElementById('creatorName').value.trim() || "名無しさん";
            const message = document.getElementById('firstMessage').value;
            const newThreadId = 'thread-' + Date.now();

            const { error } = await _supabase
                .from('posts')
                .insert([{
                    name: name,
                    subject: title,
                    message: message,
                    thread_id: newThreadId,
                    creator_secret: userSecret,
                    link_url: document.getElementById('threadLinkUrl').value.trim(),
                    link_title: document.getElementById('threadLinkTitle').value.trim(),
                    html_code: document.getElementById('threadHtmlCode').value,
                    css_code: document.getElementById('threadCssCode').value,
                    js_code: document.getElementById('threadJsCode').value,
                    is_deleted: false,
                    is_edited: false
                }]);

            if (error) {
                alert("送信に失敗しました。");
                console.error(error);
                return;
            }

            this.reset();
            activeThreadId = newThreadId;
            window.location.hash = newThreadId;
            showScreen('thread');
        });

        // 掲示板内でのクリック判定（返信、削除、訂正、拡大）
        document.getElementById('resContainer').addEventListener('click', async e => {
            if (e.target.classList.contains('uploaded-img')) {
                imgModal.style.display = "flex";
                document.getElementById('modalTargetImage').src = e.target.src;
            }
            
            if (e.target.classList.contains('expand-site-btn')) {
                const id = e.target.getAttribute('data-id');
                const { data, error } = await _supabase.from('posts').select('*').eq('id', id).single();
                if (data) {
                    modalTargetSite.srcdoc = buildFullSrcdoc(data.html_code, data.css_code, data.js_code);
                    siteModal.style.display = "flex";
                }
            }

            if (e.target.classList.contains('reply-btn')) {
                document.getElementById('message').value += `>>${e.target.getAttribute('data-resnum')}\n`;
                document.getElementById('message').focus();
            }

            // ✍️ 訂正ボタンが押された時
            if (e.target.classList.contains('edit-btn')) {
                const id = e.target.getAttribute('data-id');
                enterEditMode(id);
            }

            // 🗑️ 削除
            if (e.target.classList.contains('delete-btn')) {
                if (confirm("本当にこの投稿を削除しますか？")) {
                    const id = e.target.getAttribute('data-id');
                    const { error } = await _supabase
                        .from('posts')
                        .update({ name: "あぼーん", message: "（削除されました）", is_deleted: true, image: "", video: "", audio: "", html_code: "", css_code: "", js_code: "", link_url: "", link_title: "" })
                        .eq('id', id);

                    if (error) alert("削除に失敗しました。");
                    else renderActiveThread();
                }
            }
        });

        // スレッド全体の削除
        document.getElementById('btnDeleteThread').addEventListener('click', async () => {
            if (confirm("このスレッド内のすべての書き込みを完全に削除しますか？")) {
                const { error } = await _supabase
                    .from('posts')
                    .delete()
                    .eq('thread_id', activeThreadId);

                if (error) alert("スレッドの削除に失敗しました。");
                else {
                    activeThreadId = null;
                    window.location.hash = "";
                    showScreen('lobby');
                }
            }
        });

        // 共有リンク取得
        document.getElementById('btnShare').addEventListener('click', () => {
            const baseUrl = window.location.href.split('#')[0];
            const shareUrl = `${baseUrl}#${activeThreadId}`;
            navigator.clipboard.writeText(shareUrl).then(() => {
                alert(`リンクをコピーしました！\n\nURL: ${shareUrl}`);
            }).catch(() => {
                prompt('URLをコピーして共有してください：', shareUrl);
            });
        });

        window.addEventListener('hashchange', () => {
            const hash = window.location.hash.substring(1);
            if (hash) { activeThreadId = hash; showScreen('thread'); } else { showScreen('lobby'); }
        });

        window.addEventListener('DOMContentLoaded', () => {
            const hash = window.location.hash.substring(1);
            if (hash) { activeThreadId = hash; showScreen('thread'); } else { showScreen('lobby'); }
        });
    </script>
</body>
</html>
