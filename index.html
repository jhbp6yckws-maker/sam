<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共有対応型ミニサイト掲示板</title>
    <style>
        body {
            font-family: "ＭＳ Ｐゴシック", "MS PGothic", "ヒラギノ角ゴ Pro W3", sans-serif;
            background-color: #EFEFEF;
            color: #000000;
            padding: 20px;
        }
        h1 {
            color: #CC0000;
            font-size: 22px;
            margin-bottom: 20px;
            cursor: pointer;
        }
        h1:hover { text-decoration: underline; }
        .container { max-width: 800px; }
        .menu-box {
            background-color: #FFFFFF;
            border: 1px solid #CCCCCC;
            padding: 15px;
            margin-bottom: 20px;
        }
        .thread-list-item { margin-bottom: 8px; }
        .thread-link {
            color: #0000FF;
            text-decoration: underline;
            cursor: pointer;
            font-size: 16px;
        }
        .thread-box {
            background-color: #FFFFFF;
            border: 1px solid #CCCCCC;
            padding: 15px;
            margin-bottom: 20px;
        }
        .thread-title {
            color: #CC0000;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 2px solid #CC0000;
            padding-bottom: 5px;
        }
        .res {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px dashed #DDDDDD;
        }
        .res-header { font-size: 14px; margin-bottom: 5px; }
        .res-number { color: #000000; }
        .res-name { color: #008000; font-weight: bold; }
        .res-date-id { color: #666666; font-size: 12px; }
        .res-body { font-size: 16px; margin-left: 2em; line-height: 1.4; }
        .res-subject { font-weight: bold; color: #CC0000; font-size: 16px; }
        .anchor { color: #0000FF; text-decoration: underline; cursor: pointer; }
        
        .res-body a { color: #0000FF; text-decoration: underline; }
        
        .res-attached-link {
            margin-top: 12px;
            padding: 6px 12px;
            background-color: #F4F7F9;
            border-left: 3px solid #0066CC;
            font-size: 14px;
            display: inline-block;
        }
        .res-attached-link a { color: #0066CC; font-weight: bold; text-decoration: underline; }
        
        .btn {
            font-size: 12px;
            padding: 4px 10px;
            cursor: pointer;
            background-color: #F0F0F0;
            border: 1px solid #999999;
            border-radius: 2px;
            margin-right: 5px;
            margin-bottom: 5px;
        }
        .btn:hover { background-color: #E0E0E0; }
        .back-btn { margin-bottom: 15px; display: inline-block; }
        .share-btn { color: #0066CC; font-weight: bold; }
        .delete-btn { color: #CC0000; }
        .edit-btn { color: #008000; }
        .cancel-edit-btn { background-color: #FFCCCC; }

        .uploaded-img { cursor: zoom-in; transition: transform 0.2s; }
        .uploaded-img:hover { opacity: 0.8; }
        .uploaded-img, .uploaded-video {
            max-width: 300px;
            width: 100%;
            height: auto;
            display: block;
            margin-top: 10px;
            border: 1px solid #CCCCCC;
        }
        .uploaded-audio { display: block; margin-top: 10px; }

        .embed-site-container { margin-top: 15px; max-width: 600px; width: 100%; }
        .embed-site-title {
            font-size: 12px; color: #555555; font-weight: bold;
            margin-bottom: 3px; display: flex; align-items: center; gap: 5px;
        }
        .embed-site-frame {
            width: 100%; height: 250px; border: 1px solid #999999;
            background-color: #FFFFFF; box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        .modal-site-wrapper {
            width: 90%; height: 85%; background-color: #FFFFFF;
            border-radius: 4px; overflow: hidden; box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .youtube-container { margin-top: 10px; max-width: 480px; width: 100%; aspect-ratio: 16 / 9; }
        .youtube-container iframe { width: 100%; height: 100%; border: none; }

        .form-box {
            margin-top: 20px; background-color: #FFFFFF; padding: 15px;
            border: 1px solid #CCCCCC; display: inline-block; width: 100%;
            box-sizing: border-box; max-width: 500px;
        }
        .form-title { font-weight: bold; margin-bottom: 10px; font-size: 14px; }
        .form-box label { display: inline-block; width: 75px; }
        input[type="text"], textarea { width: 80%; padding: 4px; box-sizing: border-box; }
        textarea { height: 100px; }
        
        .code-textarea {
            font-family: monospace; height: 80px;
            background-color: #F4F7F9; border: 1px solid #A9BCC6; margin-bottom: 5px;
        }
        
        .media-capture-area {
            border: 1px dashed #666; padding: 10px; margin-top: 10px;
            background: #F9F9F9; text-align: center;
        }
        #webcam { width: 100%; max-width: 240px; border: 1px solid #000; }
        
        .modal {
            display: none; position: fixed; z-index: 1000; top: 0; left: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.85);
            justify-content: center; align-items: center;
        }
        .image-modal-mode { cursor: zoom-out; }
        .modal-content { max-width: 90%; max-height: 90%; box-shadow: 0 0 20px rgba(255,255,255,0.2); border-radius: 4px; }
        .modal-close {
            position: absolute; top: 20px; right: 25px; color: #fff;
            font-size: 35px; font-weight: bold; cursor: pointer; z-index: 1010;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <h1 id="siteTitle">■ 〇〇掲示板 ■</h1>

    <div class="container">
        <div id="lobbyScreen">
            <div class="menu-box">
                <h3>新しいお題でスレッドを立てる</h3>
                <form id="createThreadForm">
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="newThreadTitle">お題(タイトル) :</label>
                        <input type="text" id="newThreadTitle" placeholder="例：WEB開発お披露目スレ" required>
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="creatorName">名前 :</label>
                        <input type="text" id="creatorName" placeholder="名無しさん">
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="firstMessage">最初の本文 :</label>
                        <textarea id="firstMessage" placeholder="スレッドの解説など" required></textarea>
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="threadLinkUrl">リンクURL :</label>
                        <input type="text" id="threadLinkUrl" placeholder="https://example.com (任意)">
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="threadLinkTitle">リンク名 :</label>
                        <input type="text" id="threadLinkTitle" placeholder="サイト名など (任意)">
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="threadHtmlCode" style="width: auto; display: block; margin-bottom: 2px; font-weight: bold;">💻 HTML (任意) :</label>
                        <textarea id="threadHtmlCode" class="code-textarea" placeholder="<button id='btn'>Click</button>"></textarea>
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="threadCssCode" style="width: auto; display: block; margin-bottom: 2px; font-weight: bold;">🎨 CSS (任意) :</label>
                        <textarea id="threadCssCode" class="code-textarea" placeholder="button { color: red; }"></textarea>
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="threadJsCode" style="width: auto; display: block; margin-bottom: 2px; font-weight: bold;">⚡ JavaScript (任意) :</label>
                        <textarea id="threadJsCode" class="code-textarea" placeholder="document.getElementById('btn').onclick = () => alert('OK');"></textarea>
                    </div>
                    <button type="submit" class="btn">新規スレッドを立てる</button>
                </form>
            </div>

            <div class="menu-box">
                <h3>スレッド一覧</h3>
                <div id="threadList"></div>
            </div>
        </div>

        <div id="threadScreen" class="hidden">
            <button class="btn back-btn" id="btnBack">← スレッド一覧に戻る</button>
            <button class="btn back-btn share-btn" id="btnShare">🔗 このスレッドの共有リンクを取得</button>
            <button class="btn back-btn delete-btn hidden" id="btnDeleteThread">🗑️ このスレッドを削除</button>
            
            <div class="thread-box">
                <div class="thread-title" id="activeThreadTitle">スレタイトル</div>
                <div id="resContainer"></div>
            </div>

            <div class="form-box">
                <div class="form-title" id="formActionTitle">このスレッドに書き込む</div>
                <form id="postForm">
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="subject">件名 :</label>
                        <input type="text" id="subject" placeholder="無題">
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="name">名前 :</label>
                        <input type="text" id="name" placeholder="名無しさん">
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <textarea id="message" placeholder="本文を入力してください" required></textarea>
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="linkUrl">リンクURL :</label>
                        <input type="text" id="linkUrl" placeholder="https://...">
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="linkTitle">リンク名 :</label>
                        <input type="text" id="linkTitle" placeholder="タイトル">
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="htmlCode" style="width: auto; display: block; margin-bottom: 2px; font-weight: bold;">💻 HTML :</label>
                        <textarea id="htmlCode" class="code-textarea"></textarea>
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="cssCode" style="width: auto; display: block; margin-bottom: 2px; font-weight: bold;">🎨 CSS :</label>
                        <textarea id="cssCode" class="code-textarea"></textarea>
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="jsCode" style="width: auto; display: block; margin-bottom: 2px; font-weight: bold;">⚡ JavaScript :</label>
                        <textarea id="jsCode" class="code-textarea"></textarea>
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <label for="mediaFile">ファイル添付:</label>
                        <input type="file" id="mediaFile" accept="image/*,video/*,audio/*">
                    </div>
                    <div class="form-row" style="margin-bottom: 10px;">
                        <button type="button" class="btn" id="btnStartCamUser">📷 内カメラ</button>
                        <button type="button" class="btn" id="btnStartCamEnv">📷 外カメラ</button>
                        <button type="button" class="btn" id="btnStartAudioCapture">🎙️ 録音モード</button>
                    </div>
                    <div id="cameraArea" class="media-capture-area hidden">
                        <video id="webcam" autoplay playsinline muted></video><br>
                        <button type="button" class="btn" id="btnShutter">📸 撮影</button>
                        <button type="button" class="btn" id="btnStopCamera">中止</button>
                        <canvas id="captureCanvas" class="hidden"></canvas>
                    </div>
                    <div id="audioArea" class="media-capture-area hidden">
                        <button type="button" class="btn" id="btnAudioStart" style="color:red;">🔴 録音開始</button>
                        <button type="button" class="btn hidden" id="btnAudioStop">■ 停止</button>
                        <button type="button" class="btn" id="btnStopAudio">中止</button>
                    </div>
                    <div id="attachmentPreview" style="margin: 5px 0; color: #008000; font-weight: bold; font-size: 12px;"></div>
                    <button type="submit" class="btn" id="btnSubmitPost">書き込む</button>
                    <button type="button" class="btn cancel-edit-btn hidden" id="btnCancelEdit">キャンセル</button>
                </form>
            </div>
        </div>
    </div>

    <div id="imageModal" class="modal image-modal-mode"><span class="modal-close" id="modalClose">&times;</span><img class="modal-content" id="modalTargetImage"></div>
    <div id="siteModal" class="modal"><span class="modal-close" id="siteModalClose">&times;</span><div class="modal-site-wrapper"><iframe id="modalTargetSite" sandbox="allow-scripts allow-same-origin allow-modals allow-forms allow-popups allow-popups-to-escape-sandbox" allow="camera; microphone; display-capture;" style="width: 100%; height: 100%; border: none; background-color: #ffffff;"></iframe></div></div>

    <script>
        if (!localStorage.getItem('bbs_user_secret')) {
            localStorage.setItem('bbs_user_secret', Math.random().toString(36).substring(2, 12).toUpperCase());
        }
        const userSecret = localStorage.getItem('bbs_user_secret');

        function generateUserID(dateStr) {
            const dayKey = dateStr.split('(')[0]; 
            const combined = dayKey + userSecret;
            let hash = 0;
            for (let i = 0; i < combined.length; i++) { hash = (hash << 5) - hash + combined.charCodeAt(i); hash |= 0; }
            return Math.abs(hash).toString(36).substring(0, 8).toUpperCase();
        }

        const sampleThreads = [{
            id: 'thread-welcome', title: '【共有掲示板】ネット公開・共有テストスレ', creatorSecret: 'SYSTEM',
            responses: [{
                number: 1, name: '管理人★', dateId: '2026/07/13(月) 18:00:00 ID:ADMIN', subject: 'ネット上の共有に対応しました！',
                rawMessage: 'このページをGitHub Pagesなどにアップロードすることで、上部の共有ボタンから生成されたURLを使って誰とでもスレッドが共有可能になります。',
                message: 'このページをGitHub Pagesなどにアップロードすることで、上部の共有ボタンから生成されたURLを使って誰とでもスレッドが共有可能になります。',
                htmlCode: '<h3>🎉 共有デモ</h3><p>正しく公開されると世界中から見られます。</p>', cssCode: 'h3 { color: green; }', jsCode: '', image: "", video: "", audio: "", linkUrl: "", linkTitle: "", creatorSecret: 'SYSTEM', isDeleted: false
            }]
        }];

        let threads = JSON.parse(localStorage.getItem('bbs_threads')) || sampleThreads;
        let activeThreadId = null;
        let editingResNumber = null;
        let attachedImageB64 = null, attachedVideoB64 = null, attachedAudioB64 = null;
        let cameraStream = null, audioStream = null, mediaRecorder = null, chunks = [], activeFacingMode = "user", autoStopTimeout = null;

        function saveToStorage() { localStorage.setItem('bbs_threads', JSON.stringify(threads)); }
        function escapeHtml(str) { return str ? str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;') : ''; }
        function convertLinksAndAnchors(raw) { let html = escapeHtml(raw).replace(/&gt;&gt;(\d+)/g, '<span class="anchor">&gt;&gt;$1</span>'); return html.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>').replace(/\n/g, '<br>'); }
        function getBbsDate() { const now = new Date(); const days = ['日', '月', '火', '水', '木', '金', '土']; return `${now.getFullYear()}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')}(${days[now.getDay()]}) ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`; }
        function buildFullSrcdoc(h, c, j) { return `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:10px;font-family:sans-serif;}${c||''}</style></head><body>${h||''}<script>try{${j||''}}catch(e){console.error(e)}<\/script></body></html>`; }

        function renderThreadList() {
            const container = document.getElementById('threadList'); container.innerHTML = '';
            threads.forEach(t => {
                container.insertAdjacentHTML('beforeend', `<div class="thread-list-item"><span class="thread-link" data-id="${t.id}">■ ${escapeHtml(t.title)} (${t.responses.length})</span></div>`);
            });
        }

        function renderActiveThread() {
            const thread = threads.find(t => t.id === activeThreadId); if (!thread) return;
            document.getElementById('activeThreadTitle').innerText = thread.title;
            document.getElementById('btnDeleteThread').classList.toggle('hidden', thread.creatorSecret !== userSecret);
            const container = document.getElementById('resContainer'); container.innerHTML = '';

            thread.responses.forEach(res => {
                let media = res.image ? `<img src="${res.image}" class="uploaded-img">` : res.video ? `<video src="${res.video}" class="uploaded-video" controls></video>` : res.audio ? `<audio src="${res.audio}" class="uploaded-audio" controls></audio>` : '';
                let link = res.linkUrl ? `<div class="res-attached-link">🔗 <b>リンク:</b> <a href="${escapeHtml(res.linkUrl)}" target="_blank">${escapeHtml(res.linkTitle || res.linkUrl)}</a></div>` : '';
                let embed = (res.htmlCode || res.cssCode || res.jsCode) ? `<div class="embed-site-container"><div class="embed-site-title">🌐 埋め込みミニサイト: <button class="btn expand-site-btn" data-resnum="${res.number}">🔍 拡大</button></div><iframe sandbox="allow-scripts allow-same-origin allow-modals allow-forms allow-popups allow-popups-to-escape-sandbox" srcdoc="${escapeHtml(buildFullSrcdoc(res.htmlCode, res.cssCode, res.jsCode))}" class="embed-site-frame"></iframe></div>` : '';
                let actions = (res.creatorSecret === userSecret && !res.isDeleted) ? `<button class="btn edit-btn" data-resnum="${res.number}">✏️ 訂正</button><button class="btn delete-btn" data-resnum="${res.number}">🗑️ 削除</button>` : '';

                container.insertAdjacentHTML('beforeend', `
                    <div class="res">
                        <div class="res-header"><span class="res-number">${res.number}</span> ：<span class="res-name">${escapeHtml(res.name)}</span> ：<span class="res-date-id">${res.dateId}</span></div>
                        <div class="res-body">${res.subject ? `<span class="res-subject">${escapeHtml(res.subject)}</span><br><br>` : ''}${res.message}${link}${media}${embed}</div>
                        <button class="btn reply-btn" data-resnum="${res.number}">返信</button>${actions}
                    </div>
                `);
            });
        }

        function showScreen(id) {
            cancelEditMode(); stopCamera(); stopAudio();
            if (id === 'lobby') {
                document.getElementById('lobbyScreen').classList.remove('hidden'); document.getElementById('threadScreen').classList.add('hidden');
                renderThreadList();
            } else {
                document.getElementById('lobbyScreen').classList.add('hidden'); document.getElementById('threadScreen').classList.remove('hidden');
                renderActiveThread();
            }
        }

        function cancelEditMode() { editingResNumber = null; clearAttachments(); document.getElementById('formActionTitle').innerText = "このスレッドに書き込む"; document.getElementById('btnSubmitPost').innerText = "書き込む"; document.getElementById('btnCancelEdit').classList.add('hidden'); document.getElementById('postForm').reset(); }
        function clearAttachments() { attachedImageB64 = null; attachedVideoB64 = null; attachedAudioB64 = null; document.getElementById('attachmentPreview').innerText = ""; }

        // モーダルイベント
        const imgModal = document.getElementById('imageModal'), siteModal = document.getElementById('siteModal'), modalTargetSite = document.getElementById('modalTargetSite');
        imgModal.addEventListener('click', () => imgModal.style.display = "none");
        document.getElementById('siteModalClose').addEventListener('click', () => { siteModal.style.display = "none"; modalTargetSite.srcdoc = ""; });

        // カメラ・録音処理
        async function startCamera(mode) {
            stopCamera(); stopAudio(); clearAttachments(); activeFacingMode = mode;
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode }, audio: false });
                document.getElementById('webcam').srcObject = cameraStream;
                document.getElementById('cameraArea').classList.remove('hidden');
            } catch (e) { alert("カメラの起動に失敗しました。公開サーバー(https)上でのみ動作する場合があります。"); }
        }
        document.getElementById('btnStartCamUser').addEventListener('click', () => startCamera("user"));
        document.getElementById('btnStartCamEnv').addEventListener('click', () => startCamera("environment"));
        document.getElementById('btnShutter').addEventListener('click', () => {
            const canvas = document.getElementById('captureCanvas'), video = document.getElementById('webcam');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            attachedImageB64 = canvas.toDataURL('image/jpeg', 0.6);
            document.getElementById('attachmentPreview').innerText = "📸 写真を添付しました";
            stopCamera();
        });
        function stopCamera() { if(cameraStream){ cameraStream.getTracks().forEach(t=>t.stop()); cameraStream=null; } document.getElementById('cameraArea').classList.add('hidden'); }

        document.getElementById('btnStartAudioCapture').addEventListener('click', async () => {
            stopCamera(); stopAudio(); clearAttachments();
            try {
                audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                document.getElementById('audioArea').classList.remove('hidden');
                document.getElementById('btnAudioStart').classList.remove('hidden');
                document.getElementById('btnAudioStop').classList.add('hidden');
            } catch(e) { alert("マイクの起動に失敗しました。"); }
        });
        document.getElementById('btnAudioStart').addEventListener('click', () => {
            chunks = []; mediaRecorder = new MediaRecorder(audioStream);
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                let r = new FileReader(); r.onload = e => { attachedAudioB64 = e.target.result; document.getElementById('attachmentPreview').innerText = "🎙️ ボイスメッセージを添付しました"; };
                r.readAsDataURL(blob); stopAudio();
            };
            mediaRecorder.start();
            document.getElementById('btnAudioStart').classList.add('hidden'); document.getElementById('btnAudioStop').classList.remove('hidden');
        });
        document.getElementById('btnAudioStop').addEventListener('click', () => { if(mediaRecorder&&mediaRecorder.state==="recording") mediaRecorder.stop(); });
        function stopAudio() { if(audioStream){ audioStream.getTracks().forEach(t=>t.stop()); audioStream=null; } document.getElementById('audioArea').classList.add('hidden'); }
        document.getElementById('btnStopCamera').addEventListener('click', stopCamera);
        document.getElementById('btnStopAudio').addEventListener('click', stopAudio);

        // イベント制御
        document.getElementById('siteTitle').addEventListener('click', () => { activeThreadId = null; window.location.hash = ""; showScreen('lobby'); });
        document.getElementById('btnBack').addEventListener('click', () => { activeThreadId = null; window.location.hash = ""; showScreen('lobby'); });
        document.getElementById('threadList').addEventListener('click', e => { if (e.target.classList.contains('thread-link')) { activeThreadId = e.target.getAttribute('data-id'); window.location.hash = activeThreadId; showScreen('thread'); } });

        document.getElementById('createThreadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const title = document.getElementById('newThreadTitle').value.trim();
            const name = document.getElementById('creatorName').value.trim() || "名無しさん";
            const raw = document.getElementById('firstMessage').value;
            const tid = 'thread-' + Date.now();
            const dStr = getBbsDate();

            threads.unshift({
                id: tid, title: title, creatorSecret: userSecret,
                responses: [{
                    number: 1, name: name, dateId: `${dStr} ID:${generateUserID(dStr)}`, subject: title, rawMessage: raw, message: convertLinksAndAnchors(raw),
                    htmlCode: document.getElementById('threadHtmlCode').value, cssCode: document.getElementById('threadCssCode').value, jsCode: document.getElementById('threadJsCode').value,
                    linkUrl: document.getElementById('threadLinkUrl').value.trim(), linkTitle: document.getElementById('threadLinkTitle').value.trim(), image: "", video: "", audio: "", creatorSecret: userSecret, isDeleted: false
                }]
            });
            saveToStorage(); this.reset(); activeThreadId = tid; window.location.hash = tid; showScreen('thread');
        });

        document.getElementById('resContainer').addEventListener('click', e => {
            if (e.target.classList.contains('uploaded-img')) { imgModal.style.display = "flex"; document.getElementById('modalTargetImage').src = e.target.src; }
            if (e.target.classList.contains('expand-site-btn')) {
                const num = parseInt(e.target.getAttribute('data-resnum'));
                const res = threads.find(t => t.id === activeThreadId).responses.find(r => r.number === num);
                if (res) { modalTargetSite.srcdoc = buildFullSrcdoc(res.htmlCode, res.cssCode, res.jsCode); siteModal.style.display = "flex"; }
            }
            if (e.target.classList.contains('reply-btn')) { document.getElementById('message').value += `>>${e.target.getAttribute('data-resnum')}\n`; document.getElementById('message').focus(); }
            if (e.target.classList.contains('delete-btn')) {
                if(confirm("削除しますか？")) {
                    const num = parseInt(e.target.getAttribute('data-resnum'));
                    const res = threads.find(t => t.id === activeThreadId).responses.find(r => r.number === num);
                    if(res) { res.name="あぼーん"; res.message="（削除されました）"; res.htmlCode=""; res.cssCode=""; res.jsCode=""; res.image=""; res.isDeleted=true; saveToStorage(); renderActiveThread(); }
                }
            }
        });

        document.getElementById('postForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const thread = threads.find(t => t.id === activeThreadId); if (!thread) return;
            const dStr = getBbsDate();
            const nextNum = thread.responses.length + 1;

            thread.responses.push({
                number: nextNum, name: document.getElementById('name').value.trim() || "名無しさん", dateId: `${dStr} ID:${generateUserID(dStr)}`,
                subject: document.getElementById('subject').value.trim(), rawMessage: document.getElementById('message').value, message: convertLinksAndAnchors(document.getElementById('message').value),
                htmlCode: document.getElementById('htmlCode').value, cssCode: document.getElementById('cssCode').value, jsCode: document.getElementById('jsCode').value,
                linkUrl: document.getElementById('linkUrl').value.trim(), linkTitle: document.getElementById('linkTitle').value.trim(),
                image: attachedImageB64 || "", video: "", audio: attachedAudioB64 || "", creatorSecret: userSecret, isDeleted: false
            });
            saveToStorage(); renderActiveThread(); cancelEditMode();
        });

        document.getElementById('btnDeleteThread').addEventListener('click', () => { if(confirm("スレッドを削除しますか？")){ threads = threads.filter(t=>t.id!==activeThreadId); saveToStorage(); showScreen('lobby'); } });
        
        // 共有ボタンイベント
        document.getElementById('btnShare').addEventListener('click', () => {
            const thread = threads.find(t => t.id === activeThreadId); if (!thread) return;
            // ローカルファイルでもWEBサーバー上でも動くように現在のURLを動的取得
            const baseUrl = window.location.href.split('#')[0];
            const shareUrl = `${baseUrl}#${activeThreadId}`;
            
            // クリップボードへコピーを試みる
            navigator.clipboard.writeText(shareUrl).then(() => {
                alert(`リンクをクリップボードにコピーしました！\nLINEやSNSで友達に共有してください。\n\nURL: ${shareUrl}`);
            }).catch(() => {
                // コピーに失敗した場合はポップアップで表示
                prompt('以下のURLをコピーして共有してください：', shareUrl);
            });
        });

        window.addEventListener('hashchange', () => {
            const hash = window.location.hash.substring(1);
            if (hash && threads.some(t => t.id === hash)) { activeThreadId = hash; showScreen('thread'); } else { showScreen('lobby'); }
        });

        window.addEventListener('DOMContentLoaded', () => {
            const hash = window.location.hash.substring(1);
            if (hash && threads.some(t => t.id === hash)) { activeThreadId = hash; showScreen('thread'); } else { showScreen('lobby'); }
        });
    </script>
</body>
</html>
